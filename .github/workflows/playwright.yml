name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 17 * * *" # Chạy vào lúc 0h00 sáng giờ VN mỗi ngày (17h UTC)
    # THÊM MỚI: Cho phép chạy thủ công từ giao diện GitHub
  workflow_dispatch:
    inputs:
      test_type:
        description: "Chọn loại test muốn chạy"
        required: true
        default: "@smoke"
        type: choice
        options:
          - "@smoke"
          - "@regression"

jobs:
  playwright-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4, 5]
        shardTotal: [5]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # CẬP NHẬT LUỒNG IF/ELSE ĐỂ NHẬN LỆNH TỪ NÚT BẤM
      - name: Run Playwright tests
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo " Chạy Smoke Test cho Pull Request..."
            npx playwright test --grep @smoke --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo " Chạy thủ công với tag ${{ github.event.inputs.test_type }}..."
            npx playwright test --grep ${{ github.event.inputs.test_type }} --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
          else
            echo " Chạy Regression Test cho nhánh Main (Push/Schedule)..."
            npx playwright test --grep @regression --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
          fi

      - name: Upload Allure Results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.shardIndex }}
          path: allure-results
          retention-days: 1

      - name: Upload Playwright HTML Report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.shardIndex }}
          path: playwright-report
          retention-days: 1

  generate-allure-report:
    if: ${{ !cancelled() }}
    needs: [playwright-tests]
    runs-on: ubuntu-latest
    # Cấp quyền ghi (write permissions) cho GITHUB_TOKEN để có thể push code lên branch gh-pages
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci

      - name: Download Allure Results
        uses: actions/download-artifact@v4
        with:
          path: allure-results
          pattern: allure-results-*
          merge-multiple: true

      - name: Generate Allure Report
        # ĐÃ SỬA LỖI Ở ĐÂY: Thêm -y allure-commandline để máy chủ không bị treo khi hỏi cài đặt
        run: npx -y allure-commandline generate allure-results -o allure-report --clean

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 30

      - name: Deploy to GitHub Pages
        # ĐÃ SỬA LỖI Ở ĐÂY: Chỉ deploy khi có code mới đẩy thẳng lên (push), tránh lỗi mất quyền khi tạo Pull Request
        if: github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages # Branch chứa code giao diện web
          publish_dir: ./allure-report # Thư mục chứa báo cáo muốn public
